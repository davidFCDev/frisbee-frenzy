      // Handle collision - check shield first, destroy obstacle if shield is active
      function handleCollision(collidedPole) {
        // Check if shield is active
        if (gameState.hasShield) {
          // Shield destroys the obstacle
          gameState.hasShield = false;
          removeShieldAura();

          // Spawn destruction particles at obstacle position
          if (collidedPole) {
            const obstaclePos = collidedPole.mesh.position.clone();
            obstaclePos.y += 1.5; // Center of obstacle height
            spawnDestructionParticles(obstaclePos);

            // Remove the collided obstacle from scene and array
            scene.remove(collidedPole.mesh);
            const index = poles.indexOf(collidedPole);
            if (index > -1) {
              poles.splice(index, 1);
            }
          }

          // Play sound
          playSound("catch_sound", false, 1.0);

          // Show obstacle destroyed message
          const comboDisplay = document.getElementById("combo-display");
          comboDisplay.textContent = "OBSTACLE DESTROYED!";
          comboDisplay.style.color = "#00FFFF";
          comboDisplay.classList.add("visible");
          setTimeout(() => {
            comboDisplay.classList.remove("visible");
            comboDisplay.style.color = "#FFD54F";
          }, 1000);

          // Continue flying - no damage
          return;
        }

        // No shield - take damage
        gameState.lives--;

        playSound("collision_sound");

        // Update lives display
        updateLivesDisplay();

        // Show failure message
        const comboDisplay = document.getElementById("combo-display");
        const failMessages = ["FAIL!", "MISS!", "CRASH!", "OOPS!", "WIPEOUT!"];
        const randomMessage =
          failMessages[Math.floor(Math.random() * failMessages.length)];
        comboDisplay.textContent = randomMessage;
        comboDisplay.style.color = "#FF1493";
        comboDisplay.classList.add("visible");
        setTimeout(() => {
          comboDisplay.classList.remove("visible");
          comboDisplay.style.color = "#FFD54F"; // Reset to default color
        }, 1000);

        // Start collision animation
        gameState.phase = "collision";
        gameState.collisionAnimTime = 0;
        gameState.collisionStartPos = gameState.frisbeePos.clone();
        gameState.collisionVelocity = new THREE.Vector3(
          (Math.random() - 0.5) * 3, // Random horizontal velocity
          2, // Initial upward velocity
          gameState.frisbeeVel.z * 0.3, // Some forward momentum
        );
        gameState.collisionRotVel = (Math.random() - 0.5) * 20; // Random spin
      }

      // Update lives display UI
      function updateLivesDisplay() {
        for (let i = 1; i <= 3; i++) {
          const lifeIcon = document.getElementById(`life-${i}`);
          if (i > gameState.lives) {
            lifeIcon.classList.add("lost");
          } else {
            lifeIcon.classList.remove("lost");
          }
        }
      }

      // Update collision animation
      function updateCollisionAnimation(deltaTime) {
        if (gameState.phase !== "collision") return;

        gameState.collisionAnimTime += deltaTime;

        // Camera shake effect - soft and smooth
        const shakeIntensity = Math.max(
          0,
          0.5 - gameState.collisionAnimTime * 0.5,
        );
        const shakeX = (Math.random() - 0.5) * shakeIntensity;
        const shakeY = (Math.random() - 0.5) * shakeIntensity;

        // Apply shake to camera
        const baseCamX = gameState.throwerPos.x;
        const baseCamY = 13;
        const baseCamZ = gameState.throwerPos.z - 4;
        camera.position.set(baseCamX + shakeX, baseCamY + shakeY, baseCamZ);
        camera.lookAt(gameState.throwerPos.x, 0, gameState.throwerPos.z + 10);

        // Animate frisbee falling
        const gravity = 15; // Gravity acceleration
        gameState.collisionVelocity.y -= gravity * deltaTime;

        // Update position
        gameState.frisbeePos.x += gameState.collisionVelocity.x * deltaTime;
        gameState.frisbeePos.y += gameState.collisionVelocity.y * deltaTime;
        gameState.frisbeePos.z += gameState.collisionVelocity.z * deltaTime;

        // Add tumbling rotation
        gameState.frisbeeRotation += gameState.collisionRotVel * deltaTime;
        frisbeeMesh.rotation.y = gameState.frisbeeRotation;
        frisbeeMesh.rotation.x += deltaTime * 8;
        frisbeeMesh.rotation.z += deltaTime * 6;

        // Update mesh position
        frisbeeMesh.position.copy(gameState.frisbeePos);

        // End animation when frisbee falls below ground or after 1.5 seconds
        if (gameState.frisbeePos.y < -2 || gameState.collisionAnimTime > 1.5) {
          // Check if game over
          if (gameState.lives <= 0) {
            gameOver();
          } else {
            // Reset to aiming phase for another attempt
            gameState.phase = "aiming";
            gameState.frisbeePos.set(
              gameState.throwerPos.x,
              2.0,
              gameState.throwerPos.z,
            );
            frisbeeMesh.position.copy(gameState.frisbeePos);
            frisbeeMesh.rotation.set(0, 0, 0);
            clearTrail();
          }
        }
      }

      // Game over
      async function gameOver() {
        gameState.phase = "gameover";

        stopMusic();

        // Update best score
        if (gameState.score > gameState.bestScore) {
          gameState.bestScore = gameState.score;
          document.getElementById("best-value").textContent =
            gameState.bestScore;

          // Save best score
          const currentState = await lib.getUserGameState();
          const state = currentState?.state || {};
          state.bestScore = gameState.bestScore;
          if (selectedFrisbeeId) {
            state.selectedFrisbee = selectedFrisbeeId;
          }
          await lib.saveUserGameState(state);
        }

        // Submit score to leaderboard in background
        submitAndDisplayLeaderboard(gameState.score);

        // Auto-restart after a short pause
        setTimeout(() => {
          restartGame();
        }, 1200);
      }

      // Restart game
      function restartGame() {
        // Clear trail from previous game
        clearTrail();

        // Reset state
        gameState.score = 0;
        gameState.combo = 1;
        gameState.lives = 3;
        gameState.phase = "aiming";

        // Reset lives display
        updateLivesDisplay();

        gameState.throwerPos.set(0, 0, 0);
        gameState.receiverPos.set(0, 0, window.gameConfig.baseDistance || 28);
        gameState.frisbeePos.set(0, 2.0, 0);
        gameState.frisbeeVel.set(0, 0, 0);
        gameState.frisbeeRotation = 0;

        // Update positions
        throwerSprite.position.copy(gameState.throwerPos);
        receiverSprite.position.copy(gameState.receiverPos);
        frisbeeMesh.position.copy(gameState.frisbeePos);

        // Reset frisbee rotation
        frisbeeMesh.rotation.set(0, 0, 0);

        // Reset camera - tilted view with depth
        camera.position.set(0, 13, -6);
        camera.lookAt(0, 0, 10);

        // Reset ground

        // Show tutorial message again on restart

        gameState.hasShield = false;

        startMusic();

      // Draw trajectory preview - DISABLED
      function drawTrajectory() {
        const canvas = document.getElementById("trajectory-canvas");
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Only draw during aiming phase while dragging
        if (gameState.phase !== "aiming" || !gameState.isDragging) return;

        // Calculate swipe direction
        const dx = gameState.dragCurrent.x - gameState.dragStart.x;
        const dy = gameState.dragCurrent.y - gameState.dragStart.y;
        const swipeLength = Math.sqrt(dx * dx + dy * dy);

        if (swipeLength < 10) return; // Don't draw for tiny movements

        // Draw arrow showing swipe direction
        ctx.strokeStyle = "rgba(255, 255, 255, 0.8)";
        ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
        ctx.lineWidth = 4;
        ctx.lineCap = "round";

        // Draw line
        ctx.beginPath();
        ctx.moveTo(gameState.dragStart.x, gameState.dragStart.y);
        ctx.lineTo(gameState.dragCurrent.x, gameState.dragCurrent.y);
        ctx.stroke();

        // Draw arrowhead
        const angle = Math.atan2(dy, dx);
        const arrowSize = 15;
        ctx.beginPath();
        ctx.moveTo(gameState.dragCurrent.x, gameState.dragCurrent.y);
        ctx.lineTo(
          gameState.dragCurrent.x - arrowSize * Math.cos(angle - Math.PI / 6),
          gameState.dragCurrent.y - arrowSize * Math.sin(angle - Math.PI / 6),
        );
        ctx.lineTo(
          gameState.dragCurrent.x - arrowSize * Math.cos(angle + Math.PI / 6),
          gameState.dragCurrent.y - arrowSize * Math.sin(angle + Math.PI / 6),
        );
        ctx.closePath();
        ctx.fill();

        // Draw power indicator
        const power = Math.min(swipeLength / 100, 2);
        const powerBarWidth = 100;
        const powerBarHeight = 8;
        const powerBarX = gameState.dragStart.x - powerBarWidth / 2;
        const powerBarY = gameState.dragStart.y - 30;

        // Background
        ctx.fillStyle = "rgba(0, 0, 0, 0.5)";
        ctx.fillRect(powerBarX, powerBarY, powerBarWidth, powerBarHeight);

        // Power fill
        const powerColor =
          power < 1 ? "rgba(255, 255, 0, 0.8)" : "rgba(0, 255, 0, 0.8)";
        ctx.fillStyle = powerColor;
        ctx.fillRect(
          powerBarX,
          powerBarY,
          powerBarWidth * (power / 2),
          powerBarHeight,
        );
      }

      // Input handling
      function setupInput() {
        const canvas = document.getElementById("game-canvas");
        const tutorialMessage = document.getElementById("tutorial-message");

        // Minimum swipe distance required to throw (in pixels)
        const MIN_SWIPE_DISTANCE = 40;

        // Touch events - swipe to throw
        canvas.addEventListener("touchstart", (e) => {
          e.preventDefault();

          if (gameState.phase === "aiming") {
            const touch = e.touches[0];
            gameState.isDragging = true;
            gameState.dragStart = { x: touch.clientX, y: touch.clientY };
            gameState.dragCurrent = { x: touch.clientX, y: touch.clientY };

            // Hide tutorial message when player starts dragging
            if (tutorialMessage) {
              tutorialMessage.classList.remove("visible");
            }
          }

          // Resume audio context
          if (audioContext && audioContext.state === "suspended") {
            audioContext.resume();
          }
        });

        canvas.addEventListener("touchmove", (e) => {
          e.preventDefault();

          if (gameState.isDragging && gameState.phase === "aiming") {
            const touch = e.touches[0];
            gameState.dragCurrent = { x: touch.clientX, y: touch.clientY };

            // Draw trajectory preview based on swipe
            drawTrajectory();
          }
        });

        canvas.addEventListener("touchend", (e) => {
          e.preventDefault();
          if (gameState.phase === "aiming" && gameState.isDragging) {
            // Calculate swipe distance
            const dx = gameState.dragCurrent.x - gameState.dragStart.x;
            const dy = gameState.dragCurrent.y - gameState.dragStart.y;
            const swipeLength = Math.sqrt(dx * dx + dy * dy);

            // Only throw if swipe distance meets minimum requirement
            if (swipeLength >= MIN_SWIPE_DISTANCE) {
              throwFrisbee();
            } else {
              // Reset dragging state - tap was too short
              gameState.isDragging = false;

              // Clear trajectory canvas
              const trajectoryCanvas =
                document.getElementById("trajectory-canvas");
              const ctx = trajectoryCanvas.getContext("2d");
              ctx.clearRect(
                0,
                0,
                trajectoryCanvas.width,
                trajectoryCanvas.height,
              );
            }
          }
        });

        // Mouse events - drag to throw
        canvas.addEventListener("mousedown", (e) => {
          if (gameState.phase === "aiming") {
            gameState.isDragging = true;
            gameState.dragStart = { x: e.clientX, y: e.clientY };
            gameState.dragCurrent = { x: e.clientX, y: e.clientY };

            // Hide tutorial message when player starts dragging
            if (tutorialMessage) {
              tutorialMessage.classList.remove("visible");
            }
          }

          if (audioContext && audioContext.state === "suspended") {
            audioContext.resume();
          }
        });

        canvas.addEventListener("mousemove", (e) => {
          if (gameState.isDragging && gameState.phase === "aiming") {
            gameState.dragCurrent = { x: e.clientX, y: e.clientY };

            // Draw trajectory preview
            drawTrajectory();
          }
        });

        canvas.addEventListener("mouseup", (e) => {
          if (gameState.phase === "aiming" && gameState.isDragging) {
            // Calculate swipe distance
            const dx = gameState.dragCurrent.x - gameState.dragStart.x;
            const dy = gameState.dragCurrent.y - gameState.dragStart.y;
            const swipeLength = Math.sqrt(dx * dx + dy * dy);

            // Only throw if swipe distance meets minimum requirement
            if (swipeLength >= MIN_SWIPE_DISTANCE) {
              throwFrisbee();
            } else {
              // Reset dragging state - swipe was too short
              gameState.isDragging = false;

              // Clear trajectory canvas
              const trajectoryCanvas =
                document.getElementById("trajectory-canvas");
              const ctx = trajectoryCanvas.getContext("2d");
              ctx.clearRect(
                0,
                0,
                trajectoryCanvas.width,
                trajectoryCanvas.height,
              );
            }
          }
        });

        // Prevent default mouse/touch behavior on canvas to avoid scrolling issues on mobile
        canvas.addEventListener("touchcancel", (e) => {
          e.preventDefault();
          gameState.isDragging = false;

          // Clear trajectory canvas
          const trajectoryCanvas = document.getElementById("trajectory-canvas");
          const ctx = trajectoryCanvas.getContext("2d");
          ctx.clearRect(0, 0, trajectoryCanvas.width, trajectoryCanvas.height);
        });

        // Keyboard controls
        document.addEventListener("keydown", (e) => {
          if (e.code === "Space" && gameState.phase === "aiming") {
            // Space bar throws straight ahead (for testing/accessibility)
            gameState.dragStart = { x: 360, y: 640 };
            gameState.dragCurrent = { x: 360, y: 540 }; // 100 pixels swipe up

            // Hide tutorial message
            if (tutorialMessage) {
              tutorialMessage.classList.remove("visible");
            }

            throwFrisbee();
          }
        });

        // Restart button
        document
          .getElementById("restart-btn")
          .addEventListener("click", restartGame);
        document
          .getElementById("restart-btn")
          .addEventListener("touchend", (e) => {
            e.preventDefault();
            restartGame();
          });

        // Frisbee selector button
        document
          .getElementById("frisbee-selector-btn")
          .addEventListener("click", (e) => {
            e.preventDefault();
            openFrisbeeSelector();
          });
        document
          .getElementById("frisbee-selector-btn")
          .addEventListener("touchend", (e) => {
            e.preventDefault();
            e.stopPropagation();
            openFrisbeeSelector();
          });

        // Close frisbee selector

          .getElementById("close-frisbee-selector")
          .addEventListener("click", (e) => {
            e.preventDefault();
            closeFrisbeeSelector();
          });
        document
          .getElementById("close-frisbee-selector")
          .addEventListener("touchend", (e) => {
            e.preventDefault();
            closeFrisbeeSelector();
          });

        // Close overlay when clicking outside panel
        document
          .getElementById("frisbee-overlay")
          .addEventListener("click", (e) => {
            if (e.target.id === "frisbee-overlay") {
              closeFrisbeeSelector();
            }
          });
      }

      // Game loop
      let lastTime = 0;
      let lastStadiumUpdate = 0;
      function gameLoop(timestamp) {
        const deltaTime = Math.min(0.11, (timestamp - lastTime) / 1000);
        lastTime = timestamp;

        if (currentMode === "play") {
          // Show tutorial message only on first throw
          const tutorialMessage = document.getElementById("tutorial-message");
          if (tutorialMessage) {
            if (gameState.score === 0 && gameState.phase === "aiming") {
              tutorialMessage.classList.add("visible");
            } else {
              tutorialMessage.classList.remove("visible");
            }
          }

          // Update game logic
          updatePoles(deltaTime);
          updatePowerups(deltaTime);
          updateFrisbee(deltaTime);
          updateTransition(deltaTime);
          updateCollisionAnimation(deltaTime);
          updateFireworks(deltaTime); // Update fireworks particles
          updateShieldAura();

          // Update frisbee floating animation in aiming phase
          if (gameState.phase === "aiming") {
            // Floating animation - bob up and down
            const time = timestamp / 1000;
            const bobHeight = Math.sin(time * 2) * 0.15; // Slow sine wave
            const bobRotation = Math.sin(time * 1.5) * 0.1; // Gentle rotation

            // Position frisbee at thrower position with bob
            gameState.frisbeePos.copy(gameState.throwerPos);
            gameState.frisbeePos.y = throwerSprite.userData.baseY + bobHeight;

            // Hide the throwable frisbee during aiming - only show thrower sprite
            frisbeeMesh.visible = false;

            // Update thrower sprite position (floating frisbee)
            throwerSprite.position.copy(gameState.throwerPos);
            throwerSprite.position.y = throwerSprite.userData.baseY + bobHeight;
            throwerSprite.rotation.z = bobRotation;

            // Update shadow position on ground and opacity based on height
            if (throwerSprite.userData.shadow) {
              // Shadow stays on ground but follows X and Z of thrower
              throwerSprite.userData.shadow.position.x = 0;
              throwerSprite.userData.shadow.position.y =
                -(throwerSprite.userData.baseY + bobHeight) + 0.01;
              throwerSprite.userData.shadow.position.z = -0.1;

              // Opacity changes based on height (higher = fainter shadow)
              const shadowOpacity =
                0.3 *
                Math.max(
                  0.2,
                  1 - (bobHeight / throwerSprite.userData.baseY) * 0.3,
                );
              throwerSprite.userData.shadow.material.opacity = shadowOpacity;
            }

            // Animate glow ring
            if (throwerSprite.userData.glow) {
              const glowScale = 1.0 + Math.sin(time * 3) * 0.1;
              throwerSprite.userData.glow.scale.set(
                glowScale,
                glowScale,
                glowScale,
              );
              throwerSprite.userData.glow.material.opacity =
                0.2 + Math.sin(time * 3) * 0.1;
            }
          }

          // Update flag waving animation - realistic cloth physics
          if (receiverSprite && receiverSprite.userData.flag) {
            const flag = receiverSprite.userData.flag;
            const flagGeometry = receiverSprite.userData.flagGeometry;
            const originalPositions =
              receiverSprite.userData.flagOriginalPositions;
            const time = timestamp / 1000;

            // Multi-layered wave for realistic cloth movement
            const positions = flagGeometry.attributes.position;

            for (let i = 0; i < positions.count; i++) {
              const origX = originalPositions[i].x;
              const origY = originalPositions[i].y;

              // Normalize x position (0 = pole edge, 1 = free edge)
              const normalizedX = (origX + 0.75) / 1.5;

              // Multiple wave frequencies for realism
              const primaryWave = Math.sin(time * 3 + origX * 2.5) * 0.25;
              const secondaryWave =
                Math.sin(time * 5 + origX * 4 + origY) * 0.15;
              const tertiaryWave = Math.sin(time * 7 + origY * 3) * 0.08;

              // Wave amplitude increases dramatically towards free edge
              const edgeMultiplier = Math.pow(normalizedX, 1.8);

              // Vertical ripple effect
              const verticalWave =
                Math.sin(time * 4 + origY * 2) * 0.1 * edgeMultiplier;

              // Combined wave with edge amplification
              const totalWave =
                (primaryWave + secondaryWave + tertiaryWave) * edgeMultiplier;

              // Set new position with waves
              positions.setZ(i, totalWave);
              positions.setX(i, origX + verticalWave * 0.5);
            }
            positions.needsUpdate = true;
          }

          // Update stadium elements and sky less frequently for better performance
          // Only update every 100ms instead of every frame
          if (timestamp - lastStadiumUpdate > 100) {
            const targetStadiumZ = gameState.throwerPos.z + 10;

            // Move stadium elements
            stadiumElements.forEach((element) => {
              if (element.userData.baseZOffset !== undefined) {
                // Keep relative Z offset for people and decorations
                element.position.z =
                  targetStadiumZ + element.userData.baseZOffset;
              } else {
                // Move structural elements directly
                element.position.z = targetStadiumZ;
              }
            });

            // Move sky and ground with player
            if (skyMesh) {
              skyMesh.position.z = gameState.throwerPos.z;
            }
            if (groundMesh) {
              groundMesh.position.z = targetStadiumZ;
            }

            lastStadiumUpdate = timestamp;
          }

          // Draw trajectory preview
          drawTrajectory();
        }

        // Render
        renderer.render(scene, camera);

        requestAnimationFrame(gameLoop);
      }

      // Open frisbee selector
      function openFrisbeeSelector() {
        const overlay = document.getElementById("frisbee-overlay");
        const optionsContainer = document.getElementById("frisbee-options");

        // Clear existing options
        optionsContainer.innerHTML = "";

        // Create frisbee options
        frisbeeDesigns.forEach((design) => {
          const optionDiv = document.createElement("div");
          optionDiv.className = "frisbee-option";

          // In dev mode, unlock all frisbees; otherwise check score requirement
          const isUnlocked =
            window.gameConfig.devMode ||
            gameState.bestScore >= design.unlockScore;
          const isSelected = selectedFrisbeeId === design.id;

          if (!isUnlocked) {
            optionDiv.classList.add("locked");
          }
          if (isSelected) {
            optionDiv.classList.add("selected");
          }

          // Create preview
          const previewDiv = document.createElement("div");
          previewDiv.className = "frisbee-preview";
          previewDiv.style.background = `radial-gradient(circle, #${design.baseColor.toString(16).padStart(6, "0")} 0%, #${design.rimColor.toString(16).padStart(6, "0")} 100%)`;
          previewDiv.style.border = `4px solid #${design.rimColor.toString(16).padStart(6, "0")}`;
          previewDiv.innerHTML = `<span style="font-size: 48px; color: #${design.starColor.toString(16).padStart(6, "0")}; text-shadow: 0 0 8px rgba(255,255,255,0.5);">★</span>`;

          if (!isUnlocked) {
            previewDiv.innerHTML += '<div class="lock-icon">🔒</div>';
          }

          optionDiv.appendChild(previewDiv);

          // Name
          const nameDiv = document.createElement("div");
          nameDiv.className = "frisbee-name";
          nameDiv.textContent = design.name;
          optionDiv.appendChild(nameDiv);

          // Unlock requirement
          const unlockDiv = document.createElement("div");
          unlockDiv.className = "frisbee-unlock";
          if (isUnlocked) {
            unlockDiv.textContent = isSelected ? "✓ Selected" : "Unlocked";
          } else {
            unlockDiv.textContent = `Score ${design.unlockScore}+`;
          }
          optionDiv.appendChild(unlockDiv);

          // Click handler
          if (isUnlocked) {
            optionDiv.addEventListener("click", () => {
              selectedFrisbeeId = design.id;

          optionsContainer.appendChild(optionDiv);

            "Throw Power": {
              key: "gameConfig.frisbeeSpeedMultiplier",
              type: "slider",
              min: 0.7,
              max: 1.5,
              step: 0.1,
              onChange: (value) => {
                window.gameConfig.frisbeeSpeedMultiplier = value;
              },
            },
            "Catch Zone": {
              key: "gameConfig.catchZoneSize",
              type: "dropdown",
              options: [
                { label: "Small", value: "small" },
                { label: "Medium", value: "medium" },
                { label: "Large", value: "large" },
              ],
              onChange: (value) => {
                window.gameConfig.catchZoneSize = value;
              },
            },
            Gravity: {
              key: "gameConfig.gravityMultiplier",
              type: "slider",
              min: 0.7,
              max: 1.3,
              step: 0.1,
              onChange: (value) => {
                window.gameConfig.gravityMultiplier = value;
              },
            },
          },
        });

        // Preload assets
        await preloadAssets();

        // Load saved state
        await loadSavedState();

        // Initialize receiver position from config before creating scene
        gameState.receiverPos.set(0, 0, window.gameConfig.baseDistance || 28);

        // Initialize scene
        initScene();

        // Setup input
        setupInput();

        // Mode-specific setup
        if (mode === "edit") {
          setupEditMode();
        } else {
          setupPlayMode();
        }

        // Start game loop
        requestAnimationFrame(gameLoop);
      }
    </script>
  </body>
</html>
